[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Timezone for revision timestamps.
timezone = UTC

# Set to 'true' to search source files recursively in each "version_locations" directory.
recursive_version_locations = false

# Output encoding used when revision files are written.
output_encoding = utf-8

# sqlalchemy.url is intentionally NOT set here.
# The real DATABASE_URL is injected at runtime in alembic/env.py via
# app.core.config so credentials are never committed to this file.
sqlalchemy.url =

[post_write_hooks]
# No post-write formatting hooks configured.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S